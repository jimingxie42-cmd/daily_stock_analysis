name: dual_low_us
display_name: Dual Low (US)
description: Low PE + low PB value screening for US equities
version: "1.0"
category: value
tags: [value, defensive, low_valuation, us]

screening:
  enabled: true
  market_scope: [us]
  hard_filters:
    amount_min: 10000000
    pe_ttm_max: 18
    pb_max: 3.0
    market_cap_min: 2000000000
    price_min: 5
  tech_weight: 0.2
  factor_weights:
    value: 0.55
    liquidity: 0.15
    stability: 0.20
    size: 0.10
  scoring_profile:
    momentum_chase_start_pct: 2.5
    activity_ideal_volume_ratio: 1.2
    activity_ideal_turnover_rate: 2.0
    stability_hot_change_pct: 4.0
  risk_profile:
    chase_change_pct: 5.0
    abnormal_volume_ratio: 4.0
    high_turnover_rate: 8.0
    low_llm_confidence: 0.45
  ranking_hints: |
    Prioritize:
    1. Strong industry position, quality cash flows, stable dividends
    2. Valuation near 3-year lows
    3. No major litigation or regulatory risk
  max_output: 10
