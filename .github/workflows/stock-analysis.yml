name: 股票智能分析

on:
  schedule:
    # 每天5次，精准覆盖关键决策窗口 (UTC = BJT-8)
    - cron: '35 1 * * 1-5'     # 9:35  开盘分析
    - cron: '25 2 * * 1-5'     # 10:25 盘中确认
    - cron: '25 3 * * 1-5'     # 11:25 午盘准备
    - cron: '5 5 * * 1-5'      # 13:05 午后战略
    - cron: '40 6 * * 1-5'     # 14:40 收盘决策
  workflow_dispatch:  # 手动触发

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stock analysis
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          LITELLM_MODEL: openai/deepseek-chat
          STOCK_LIST: ${{ secrets.STOCK_LIST }}
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          SERVERCHAN3_SENDKEY: ${{ secrets.SERVERCHAN3_SENDKEY }}
          SCHEDULE_ENABLED: 'false'
          RUN_IMMEDIATELY: 'true'
          MARKET_REVIEW_ENABLED: 'false'
        run: python main.py --force-run
