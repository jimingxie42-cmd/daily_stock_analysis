name: 股票智能分析

on:
  schedule:
    - cron: '35 1 * * 1-5'     # 9:35  选股+持仓
    - cron: '25 2 * * 1-5'     # 10:25 持仓分析
    - cron: '25 3 * * 1-5'     # 11:25 持仓分析
    - cron: '5 5 * * 1-5'      # 13:05 持仓分析
    - cron: '35 6 * * 1-5'     # 14:35 选股+持仓+买卖建议
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run custom analysis
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          SERVERCHAN3_SENDKEY: ${{ secrets.SERVERCHAN3_SENDKEY }}
        run: python analyze.py
