name: 股票分析推送

on:
  schedule:
    - cron: '30 1 * * 1-5'     # 9:30  BJT  开盘快照推送
    - cron: '30 2 * * 1-5'     # 10:30 BJT  盘中快照推送
    - cron: '30 5 * * 1-5'     # 13:30 BJT  午后快照推送
    - cron: '30 6 * * 1-5'     # 14:30 BJT  盘后复推送
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 🤖 AI 分析推送（主推）
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          LITELLM_MODEL: openai/deepseek-v4-pro
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          SERVERCHAN3_SENDKEY: ${{ secrets.SERVERCHAN3_SENDKEY }}
        run: python analyze.py

      - name: 📊 快照保底推送（上一步失败时）
        if: failure()
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          SERVERCHAN3_SENDKEY: ${{ secrets.SERVERCHAN3_SENDKEY }}
        run: python push_holdings.py
