name: 股票智能分析

on:
  schedule:
    - cron: '35 1 * * 1-5'     # 9:35  选股+持仓
    - cron: '25 2 * * 1-5'     # 10:25 持仓分析
    - cron: '25 3 * * 1-5'     # 11:25 持仓分析
    - cron: '5 5 * * 1-5'      # 13:05 持仓分析
    - cron: '35 6 * * 1-5'     # 14:35 选股+持仓+买卖建议
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: AlphaSift 选股
        timeout-minutes: 5
        continue-on-error: true
        run: |
          git clone --depth 1 https://github.com/ZhuLinsen/alphasift.git /tmp/alphasift 2>/dev/null || true
          pip install -q -e /tmp/alphasift 2>/dev/null || true
          echo "### AI选股" > /tmp/picks.md
          alphasift screen capital_heat --no-llm --max 5 2>/dev/null >> /tmp/picks.md || echo "capital_heat skipped" >> /tmp/picks.md
          echo "" >> /tmp/picks.md
          alphasift screen volume_breakout --no-llm --max 3 2>/dev/null >> /tmp/picks.md || echo "volume_breakout skipped" >> /tmp/picks.md
          cat /tmp/picks.md

      - name: Run holdings analysis
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          LITELLM_MODEL: openai/deepseek-chat
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          SERVERCHAN3_SENDKEY: ${{ secrets.SERVERCHAN3_SENDKEY }}
          SCHEDULE_ENABLED: 'false'
          RUN_IMMEDIATELY: 'true'
          MARKET_REVIEW_ENABLED: 'false'
        run: python run_analysis.py
