name: 股票智能分析

on:
  schedule:
    - cron: '35 1 * * 1-5'     # 9:35  选股+持仓
    - cron: '25 2 * * 1-5'     # 10:25 持仓分析
    - cron: '25 3 * * 1-5'     # 11:25 持仓分析
    - cron: '5 5 * * 1-5'      # 13:05 持仓分析
    - cron: '35 6 * * 1-5'     # 14:35 选股+持仓+买卖建议
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: AlphaSift 选股 (仅9:35和14:35)
        timeout-minutes: 5
        continue-on-error: true
        run: |
          H=$(date -u +%H)
          if [ "$H" = "01" ] || [ "$H" = "06" ]; then
            git clone --depth 1 https://github.com/ZhuLinsen/alphasift.git /tmp/alphasift 2>/dev/null
            pip install -q -e /tmp/alphasift 2>/dev/null
            python3 -c "
          import subprocess, sys
          # 限制主板: sh60, sh68 excluded, sz00, sz30 excluded
          strategies = ['capital_heat', 'volume_breakout']
          for s in strategies:
              print(f'=== {s} ===')
              subprocess.run(f'alphasift screen {s} --no-llm --max 5', shell=True, timeout=240)
          " 2>/dev/null || echo "选股超时"
          else
            echo "非选股时段，跳过"
          fi

      - name: Run holdings analysis
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          LITELLM_MODEL: openai/deepseek-chat
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          SERVERCHAN3_SENDKEY: ${{ secrets.SERVERCHAN3_SENDKEY }}
          SCHEDULE_ENABLED: 'false'
          RUN_IMMEDIATELY: 'true'
          MARKET_REVIEW_ENABLED: 'false'
        run: python run_analysis.py
