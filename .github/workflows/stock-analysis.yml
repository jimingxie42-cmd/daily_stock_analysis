name: 股票智能分析

on:
  schedule:
    - cron: '35 1 * * 1-5'
    - cron: '25 2 * * 1-5'
    - cron: '25 3 * * 1-5'
    - cron: '5 5 * * 1-5'
    - cron: '40 6 * * 1-5'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps & AlphaSift
        run: |
          pip install -r requirements.txt
          git clone --depth 1 https://github.com/ZhuLinsen/alphasift.git /tmp/alphasift 2>/dev/null
          pip install -q -e /tmp/alphasift 2>/dev/null

      - name: AlphaSift market screening
        run: |
          echo "### AI精选" > /tmp/picks.md
          alphasift screen capital_heat --no-llm --max 5 2>/dev/null >> /tmp/picks.md
          echo "" >> /tmp/picks.md
          alphasift screen volume_breakout --no-llm --max 3 2>/dev/null >> /tmp/picks.md
        continue-on-error: true

      - name: Run analysis
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          LITELLM_MODEL: openai/deepseek-chat
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          SERVERCHAN3_SENDKEY: ${{ secrets.SERVERCHAN3_SENDKEY }}
          SCHEDULE_ENABLED: 'false'
          RUN_IMMEDIATELY: 'true'
          MARKET_REVIEW_ENABLED: 'false'
        run: |
          STOCK_LIST=$(python3 -c "import json;d=json.load(open('holdings.json'));print(','.join(s['code']for s in d['stocks']))")
          POSCTX=$(python3 -c "import json;d=json.load(open('holdings.json'));print(' '.join(f\"{s['name']}{s['code']}持{s['shares']}股成本{s['cost']}\" for s in d['stocks']))")
          [ -f /tmp/picks.md ] && export MARKET_PICKS=$(cat /tmp/picks.md)
          export STOCK_LIST POSITION_CONTEXT="$POSCTX"
          python main.py --force-run
