name: 股票智能分析

on:
  schedule:
    # 北京时间 9:30-11:30, 13:00-15:00 每30分钟 (UTC = BJT-8)
    - cron: '30,0 1,2,3 * * 1-5'    # 9:30,10:00,10:30,11:00 BJT
    - cron: '0,30 5,6 * * 1-5'      # 13:00,13:30,14:00,14:30 BJT
  workflow_dispatch:  # 手动触发

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stock analysis
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          LITELLM_MODEL: openai/deepseek-chat
          STOCK_LIST: ${{ secrets.STOCK_LIST }}
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          SERVERCHAN3_SENDKEY: ${{ secrets.SERVERCHAN3_SENDKEY }}
          SCHEDULE_ENABLED: 'false'
          RUN_IMMEDIATELY: 'true'
          MARKET_REVIEW_ENABLED: 'false'
        run: python main.py --force-run
