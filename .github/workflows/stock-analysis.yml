name: 股票智能分析

on:
  schedule:
    - cron: '30 0 * * 1-5'     # 8:30  BJT  盘前推荐+买入建议
    - cron: '30 1 * * 1-5'     # 9:30  BJT  开盘快照
    - cron: '30 2 * * 1-5'     # 10:30 BJT  盘中快照
    - cron: '30 5 * * 1-5'     # 13:30 BJT  午后快照
    - cron: '30 6 * * 1-5'     # 14:30 BJT  盘后复盘+推荐+买入建议
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - name: Run analysis
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          LITELLM_MODEL: openai/deepseek-v4-pro
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          SERVERCHAN3_SENDKEY: ${{ secrets.SERVERCHAN3_SENDKEY }}
        run: python analyze.py
