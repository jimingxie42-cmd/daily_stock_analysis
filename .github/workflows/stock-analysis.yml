name: 股票智能分析

on:
  schedule:
    - cron: '35 1 * * 1-5'     # 9:35  选股+持仓
    - cron: '25 2 * * 1-5'     # 10:25 持仓分析
    - cron: '25 3 * * 1-5'     # 11:25 持仓分析
    - cron: '5 5 * * 1-5'      # 13:05 持仓分析
    - cron: '35 6 * * 1-5'     # 14:35 选股+持仓+买卖建议
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: AlphaSift screening
        continue-on-error: true
        run: |
          pip install -e ./alphasift_src 2>/dev/null
          echo "### AlphaSift主力资金" > /tmp/alpha_picks.md
          alphasift screen capital_heat --no-llm --max 5 2>/dev/null >> /tmp/alpha_picks.md
          echo "" >> /tmp/alpha_picks.md
          echo "### AlphaSift放量突破" >> /tmp/alpha_picks.md
          alphasift screen volume_breakout --no-llm --max 5 2>/dev/null >> /tmp/alpha_picks.md

      - name: Run daily stock analysis
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          LITELLM_MODEL: openai/deepseek-chat
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          SERVERCHAN3_SENDKEY: ${{ secrets.SERVERCHAN3_SENDKEY }}
          SCHEDULE_ENABLED: 'false'
          RUN_IMMEDIATELY: 'true'
          MARKET_REVIEW_ENABLED: 'false'
        run: python run_analysis.py

      - name: Push AlphaSift picks
        continue-on-error: true
        run: |
          if [ -s /tmp/alpha_picks.md ]; then
            python3 -c "
          import urllib.request, urllib.parse, json, os
          picks = open('/tmp/alpha_picks.md').read()
          token = os.environ.get('PUSHPLUS_TOKEN','')
          skey = os.environ.get('SERVERCHAN3_SENDKEY','')
          if token:
              data = json.dumps({'token': token, 'title': 'AlphaSift选股', 'content': picks[:5000]}).encode()
              urllib.request.urlopen(urllib.request.Request('https://www.pushplus.plus/send', data=data, headers={'Content-Type':'application/json'}), timeout=10)
          if skey:
              urllib.request.urlopen(f'https://sctapi.ftqq.com/{skey}.send?title=AlphaSift选股&desp={urllib.parse.quote(picks[:5000])}', timeout=10)
          print('选股已推送')
          " 2>/dev/null || echo "推送失败"
          fi
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          SERVERCHAN3_SENDKEY: ${{ secrets.SERVERCHAN3_SENDKEY }}
